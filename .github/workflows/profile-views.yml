name: Update Profile Views
on:
  schedule: [{cron: "0 * * * *"}]
  workflow_dispatch:
  push: {branches: ["main", "master"]}

jobs:
  update-views:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update Count and Generate Badge
        run: |
          [ -f views.txt ] || echo 0 > views.txt
          COUNT=$(($(cat views.txt) + 1))
          echo $COUNT > views.txt
          curl -s "https://img.shields.io/badge/VISITS-${COUNT}-58a6ff?style=for-the-badge&logo=github" > profile_views_badge.svg

      - name: Commit and Push
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          git add views.txt profile_views_badge.svg
          git commit -m "Update profile views" || exit 0
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
